services:
  home-compass:
    build: .
    container_name: home-compass
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: home-compass-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - home-compass
    restart: unless-stopped
